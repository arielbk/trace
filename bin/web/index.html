<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trace</title>
    <script>
      // Resolve the theme before first paint to avoid a flash: an explicit
      // stored override wins, otherwise the OS prefers-color-scheme decides.
      // Mirrors resolveInitialTheme() in src/theme.ts.
      (function () {
        try {
          var stored = localStorage.getItem("trace.theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
